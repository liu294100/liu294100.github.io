<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多出口检测 | IP 工具箱</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">IP 工具箱</div>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="split-tunnel.html">分流检测</a>
            <a href="multi.html" class="active">多出口检测</a>
            <a href="cdn-node-lookup.html">CDN 节点</a>
            <a href="dns-exit-lookup.html">DNS 出口</a>
            <a href="stun.html">STUN 检测</a>
            <a href="query.html">IP 查询</a>
            <a href="rule-check.html">规则检测</a>
            <a href="ai-check.html">AI 检测</a>
            <a href="ping.html">Ping</a>
            <a href="status.html">状态监控</a>
            <a href="ip-risk.html">IP 风险</a>
        </div>
        <button class="theme-toggle" id="theme-toggle" title="切换主题">🌙</button>
        <button class="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
    </nav>

    <div class="container">
        <section class="card">
            <h2 class="card-title">多出口 IP 检测</h2>
            <p class="card-desc">通过多个不同的 API 服务同时检测你的出口 IP，对比各个数据源返回的结果，判断是否存在多出口或负载均衡。</p>

            <div class="info-box">
                <strong>说明：</strong>如果不同数据源返回了不同的 IP 地址，可能意味着你的网络使用了多出口、负载均衡，或者部分请求走了代理。
            </div>

            <button class="refresh-btn" onclick="startMultiDetection()">&#128260; 重新检测</button>

            <div class="multi-grid" id="multi-grid" style="margin-top:16px;">
                <!-- Generated by JS -->
            </div>

            <div id="multi-summary" class="split-verdict" style="margin-top:20px;">
                <span class="loading-dot"></span> 正在检测多出口状态...
            </div>
        </section>

        <section class="card">
            <h2 class="card-title">IP 一致性分析</h2>
            <p class="card-desc">对比所有检测结果的 IP 地址</p>
            <div id="ip-comparison" style="margin-top:12px;">
                <div class="split-item"><span class="label">等待检测完成...</span></div>
            </div>
        </section>

        <footer class="footer">
            <p>&copy; 2025 IP 工具箱 | <a href="index.html">返回首页</a></p>
        </footer>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/multi.js"></script>
</body>
</html>
