<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圣诞快乐</title>
    <style>
        :root {
            --bg1: #060918;
            --bg2: #0b1b4a;
            --bg3: #2a0c2a;
            --glow: rgba(120, 200, 255, 0.25);
            --tree1: #2aa36b;
            --tree2: #157a52;
            --tree3: #0f5640;
            --gold: #ffd166;
            --gold2: #ffea94;
            --shadow: rgba(0, 0, 0, 0.35);
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: #fff;
            background:
                radial-gradient(1200px 800px at 50% 20%, rgba(104, 179, 255, 0.18), transparent 60%),
                radial-gradient(900px 600px at 80% 50%, rgba(255, 126, 200, 0.10), transparent 60%),
                radial-gradient(700px 500px at 20% 55%, rgba(123, 255, 215, 0.08), transparent 60%),
                linear-gradient(120deg, var(--bg1), var(--bg2), var(--bg3));
            background-size: 200% 200%;
            animation: bgShift 10s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { background-position: 0% 10%; }
            100% { background-position: 100% 90%; }
        }

        #sky {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .vignette {
            position: fixed;
            inset: -20%;
            z-index: 1;
            pointer-events: none;
            background:
                radial-gradient(closest-side at 50% 20%, rgba(0,0,0,0.0), rgba(0,0,0,0.45) 70%),
                radial-gradient(closest-side at 50% 120%, rgba(0,0,0,0.0), rgba(0,0,0,0.55) 70%);
            filter: blur(10px);
        }

        .scene {
            position: relative;
            z-index: 2;
            height: 100%;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .wrap {
            width: min(520px, 92vw);
            display: grid;
            place-items: center;
            gap: 14px;
        }

        .tree-wrap {
            position: relative;
            width: min(420px, 86vw);
            aspect-ratio: 1 / 1.15;
            display: grid;
            place-items: center;
            filter: drop-shadow(0 28px 40px rgba(0,0,0,0.45));
        }

        .tree-glow {
            position: absolute;
            inset: -20%;
            background: radial-gradient(circle at 50% 60%, rgba(120, 220, 255, 0.22), transparent 55%);
            filter: blur(8px);
            animation: pulseGlow 2.6s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.55; transform: scale(0.98); }
            100% { opacity: 0.9; transform: scale(1.02); }
        }

        .tree {
            position: relative;
            width: 72%;
            height: 88%;
            transform-origin: 50% 88%;
            animation: sway 5.6s ease-in-out infinite;
        }

        @keyframes sway {
            0% { transform: rotate(-0.8deg); }
            50% { transform: rotate(0.9deg); }
            100% { transform: rotate(-0.8deg); }
        }

        .layer {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            border-radius: 18px;
            filter: drop-shadow(0 14px 18px rgba(0,0,0,0.25));
        }

        .layer::after {
            content: "";
            position: absolute;
            inset: 0;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            background:
                radial-gradient(120px 80px at 55% 30%, rgba(255,255,255,0.16), transparent 60%),
                radial-gradient(120px 80px at 35% 70%, rgba(255,255,255,0.10), transparent 65%);
            mix-blend-mode: screen;
            opacity: 0.75;
        }

        .layer.l1 {
            top: 6%;
            width: 44%;
            height: 21%;
            background: linear-gradient(180deg, #2fd37d, var(--tree2));
            z-index: 6;
        }

        .layer.l2 {
            top: 18%;
            width: 62%;
            height: 25%;
            background: linear-gradient(180deg, var(--tree1), var(--tree3));
            z-index: 5;
        }

        .layer.l3 {
            top: 34%;
            width: 82%;
            height: 29%;
            background: linear-gradient(180deg, #1fa86c, #0b4b3a);
            z-index: 4;
        }

        .layer.l4 {
            top: 52%;
            width: 100%;
            height: 32%;
            background: linear-gradient(180deg, #169d62, #073a30);
            z-index: 3;
        }

        .tinsel {
            position: absolute;
            left: 50%;
            top: 23%;
            width: 92%;
            height: 48%;
            transform: translateX(-50%);
            z-index: 7;
            pointer-events: none;
        }

        .tinsel::before,
        .tinsel::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(9px 9px at 12% 22%, rgba(255,255,255,0.35), transparent 65%),
                radial-gradient(10px 10px at 78% 18%, rgba(255,255,255,0.28), transparent 70%),
                radial-gradient(8px 8px at 22% 62%, rgba(255,255,255,0.24), transparent 70%),
                radial-gradient(9px 9px at 70% 68%, rgba(255,255,255,0.26), transparent 70%),
                radial-gradient(10px 10px at 45% 40%, rgba(255,255,255,0.20), transparent 70%),
                radial-gradient(12px 12px at 55% 78%, rgba(255,255,255,0.18), transparent 72%);
            filter: blur(0.2px);
            opacity: 0.75;
            animation: tinselSpark 1.8s ease-in-out infinite alternate;
        }

        .tinsel::after {
            opacity: 0.55;
            animation-duration: 2.4s;
            animation-delay: 0.25s;
        }

        @keyframes tinselSpark {
            0% { transform: translateY(0px); filter: blur(0.2px); }
            100% { transform: translateY(-2px); filter: blur(0.4px); }
        }

        .garland {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            height: 18%;
            z-index: 8;
            pointer-events: none;
        }

        .garland.g1 { top: 26%; }
        .garland.g2 { top: 42%; }
        .garland.g3 { top: 58%; }

        .garland::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            border-bottom: 6px solid rgba(255, 255, 255, 0.16);
            border-radius: 0 0 80% 80%;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.25));
        }

        .garland::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 55%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            border-bottom: 3px solid rgba(255, 215, 110, 0.18);
            border-radius: 0 0 80% 80%;
            filter: blur(0.2px);
        }

        .lights {
            position: absolute;
            inset: 0;
            z-index: 9;
            pointer-events: none;
        }

        .bulb {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.22) 35%, rgba(255,255,255,0.05) 55%, rgba(0,0,0,0.0) 70%),
                        radial-gradient(circle at 50% 55%, var(--c1), var(--c2));
            box-shadow:
                0 0 8px rgba(255,255,255,0.16),
                0 0 18px var(--glowc),
                0 0 40px rgba(255,255,255,0.06);
            transform: translate(-50%, -50%);
            animation: blink 1.8s ease-in-out infinite;
        }

        .bulb::before {
            content: "";
            position: absolute;
            left: 50%;
            top: -6px;
            width: 8px;
            height: 6px;
            transform: translateX(-50%);
            border-radius: 3px 3px 2px 2px;
            background: linear-gradient(180deg, rgba(255,255,255,0.40), rgba(255,255,255,0.12));
            opacity: 0.7;
        }

        @keyframes blink {
            0% { filter: brightness(0.85); opacity: 0.65; }
            45% { filter: brightness(1.15); opacity: 1; }
            100% { filter: brightness(0.9); opacity: 0.7; }
        }

        .ornaments {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        .ornament {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 999px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.85), rgba(255,255,255,0.12) 35%, rgba(0,0,0,0.0) 60%),
                        radial-gradient(circle at 55% 60%, var(--o1), var(--o2));
            box-shadow:
                0 10px 18px rgba(0,0,0,0.20),
                0 0 14px rgba(255,255,255,0.08);
            animation: ornamentFloat 2.4s ease-in-out infinite alternate;
        }

        .ornament::after {
            content: "";
            position: absolute;
            left: 50%;
            top: -7px;
            width: 10px;
            height: 7px;
            transform: translateX(-50%);
            border-radius: 3px 3px 2px 2px;
            background: linear-gradient(180deg, rgba(255, 245, 214, 0.55), rgba(255,255,255,0.10));
            opacity: 0.8;
        }

        @keyframes ornamentFloat {
            0% { transform: translate(-50%, -50%) translateY(0px); }
            100% { transform: translate(-50%, -50%) translateY(-2px); }
        }

        .top-star {
            position: absolute;
            left: 50%;
            top: 1%;
            width: 78px;
            height: 78px;
            transform: translate(-50%, -60%);
            z-index: 12;
            filter: drop-shadow(0 0 18px rgba(255, 220, 130, 0.28)) drop-shadow(0 0 46px rgba(255, 200, 80, 0.18));
        }

        .top-star .shape {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 40% 35%, rgba(255,255,255,0.95), rgba(255,255,255,0.16) 42%, rgba(0,0,0,0) 60%),
                conic-gradient(from 20deg, var(--gold2), var(--gold), #ffb703, var(--gold2));
            clip-path: polygon(50% 3%, 60% 36%, 94% 36%, 66% 55%, 76% 88%, 50% 68%, 24% 88%, 34% 55%, 6% 36%, 40% 36%);
            border-radius: 12px;
            animation: starPulse 1.35s ease-in-out infinite alternate;
        }

        .top-star .rays {
            position: absolute;
            inset: -26%;
            background:
                radial-gradient(circle at 50% 50%, rgba(255, 236, 170, 0.32), rgba(255, 236, 170, 0.0) 60%),
                conic-gradient(from 0deg, rgba(255, 236, 170, 0.0), rgba(255, 236, 170, 0.24), rgba(255, 236, 170, 0.0), rgba(255, 236, 170, 0.18), rgba(255, 236, 170, 0.0));
            filter: blur(1px);
            animation: raySpin 3.6s linear infinite;
            opacity: 0.75;
        }

        @keyframes starPulse {
            0% { transform: scale(0.96); filter: brightness(0.95); }
            100% { transform: scale(1.06); filter: brightness(1.25); }
        }

        @keyframes raySpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .trunk {
            position: absolute;
            left: 50%;
            bottom: 5%;
            width: 16%;
            height: 17%;
            transform: translateX(-50%);
            border-radius: 10px;
            background:
                radial-gradient(60px 50px at 40% 30%, rgba(255,255,255,0.12), transparent 60%),
                linear-gradient(180deg, #5a3a2a, #2b1510);
            box-shadow: 0 18px 26px rgba(0,0,0,0.38);
            z-index: 2;
        }

        .snow-base {
            position: absolute;
            left: 50%;
            bottom: -2%;
            width: 120%;
            height: 18%;
            transform: translateX(-50%);
            background:
                radial-gradient(220px 90px at 40% 40%, rgba(255,255,255,0.95), rgba(255,255,255,0.68)),
                radial-gradient(200px 80px at 70% 55%, rgba(255,255,255,0.85), rgba(255,255,255,0.55));
            border-radius: 999px;
            filter: drop-shadow(0 18px 24px rgba(0,0,0,0.25));
            z-index: 1;
        }

        .gifts {
            position: absolute;
            left: 50%;
            bottom: 0%;
            width: 96%;
            height: 24%;
            transform: translateX(-50%);
            z-index: 1;
            pointer-events: none;
        }

        .gift {
            position: absolute;
            bottom: 10%;
            width: 20%;
            height: 44%;
            border-radius: 10px;
            box-shadow: 0 18px 26px rgba(0,0,0,0.35);
            animation: giftBob 2.6s ease-in-out infinite alternate;
        }

        .gift::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 0;
            width: 18%;
            height: 100%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.28);
            mix-blend-mode: screen;
            opacity: 0.75;
        }

        .gift::after {
            content: "";
            position: absolute;
            left: 50%;
            top: -10%;
            width: 86%;
            height: 22%;
            transform: translateX(-50%);
            border-radius: 10px;
            background: rgba(255,255,255,0.14);
            box-shadow: 0 8px 14px rgba(0,0,0,0.18);
        }

        @keyframes giftBob {
            0% { transform: translateY(0px) rotate(-0.3deg); }
            100% { transform: translateY(-3px) rotate(0.4deg); }
        }

        .gift.g1 { left: 8%; background: linear-gradient(180deg, #ff477e, #b5172f); animation-delay: 0.1s; }
        .gift.g2 { left: 40%; width: 22%; height: 52%; background: linear-gradient(180deg, #3a86ff, #1b3fae); animation-delay: 0.35s; }
        .gift.g3 { right: 8%; background: linear-gradient(180deg, #ffd166, #c77d00); animation-delay: 0.22s; }

        .message {
            text-align: center;
            font-weight: 800;
            letter-spacing: 0.6px;
            text-shadow:
                0 2px 10px rgba(0,0,0,0.35),
                0 0 24px rgba(140, 220, 255, 0.22);
        }

        .message .main {
            font-size: clamp(22px, 4.6vw, 34px);
            line-height: 1.1;
        }

        .message .sub {
            margin-top: 6px;
            font-size: clamp(12px, 2.6vw, 15px);
            font-weight: 600;
            opacity: 0.85;
        }

        .shine {
            display: inline-block;
            background: linear-gradient(90deg, rgba(255,255,255,0.20), rgba(255,255,255,0.95), rgba(255,255,255,0.20));
            background-size: 220% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: textShine 2.6s ease-in-out infinite;
        }

        @keyframes textShine {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
    </style>
</head>
<body>
    <canvas id="sky"></canvas>
    <div class="vignette"></div>

    <div class="scene">
        <div class="wrap">
            <div class="tree-wrap" id="treeWrap">
                <div class="tree-glow"></div>
                <div class="tree" id="tree">
                    <div class="top-star">
                        <div class="rays"></div>
                        <div class="shape"></div>
                    </div>

                    <div class="layer l1"></div>
                    <div class="layer l2"></div>
                    <div class="layer l3"></div>
                    <div class="layer l4"></div>

                    <div class="tinsel"></div>
                    <div class="garland g1"></div>
                    <div class="garland g2"></div>
                    <div class="garland g3"></div>

                    <div class="lights" id="lights"></div>
                    <div class="ornaments" id="ornaments"></div>

                    <div class="trunk"></div>
                    <div class="snow-base"></div>
                </div>

                <div class="gifts">
                    <div class="gift g1"></div>
                    <div class="gift g2"></div>
                    <div class="gift g3"></div>
                </div>
            </div>

            <div class="message">
                <div class="main"><span class="shine">Merry Christmas</span></div>
                <div class="sub">愿你所求皆如愿，所行皆坦途</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('sky');
        const ctx = canvas.getContext('2d', { alpha: true });

        const DPR = Math.min(2, window.devicePixelRatio || 1);
        let w = 0;
        let h = 0;

        function resize() {
            w = Math.floor(window.innerWidth);
            h = Math.floor(window.innerHeight);
            canvas.width = Math.floor(w * DPR);
            canvas.height = Math.floor(h * DPR);
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        }

        const stars = [];
        const snow = [];
        const shooters = [];

        function rand(min, max) { return min + Math.random() * (max - min); }

        function makeStars() {
            stars.length = 0;
            const count = Math.floor((w * h) / 9000);
            for (let i = 0; i < count; i += 1) {
                const r = rand(0.6, 2.0);
                stars.push({
                    x: rand(0, w),
                    y: rand(0, h),
                    r,
                    tw: rand(0.6, 2.2),
                    ph: rand(0, Math.PI * 2),
                    base: rand(0.18, 0.62)
                });
            }
        }

        function makeSnow() {
            snow.length = 0;
            const count = Math.floor((w * h) / 12000) + 70;
            for (let i = 0; i < count; i += 1) {
                snow.push({
                    x: rand(0, w),
                    y: rand(0, h),
                    r: rand(0.8, 2.6),
                    vy: rand(0.45, 1.45),
                    vx: rand(-0.25, 0.25),
                    a: rand(0.18, 0.78)
                });
            }
        }

        function spawnShooter() {
            const fromLeft = Math.random() < 0.55;
            const x = fromLeft ? rand(-80, w * 0.25) : rand(w * 0.55, w + 80);
            const y = rand(-40, h * 0.35);
            const speed = rand(12, 22);
            const angle = fromLeft ? rand(0.35, 0.85) : rand(2.35, 2.80);
            shooters.push({
                x,
                y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: rand(18, 28),
                len: rand(160, 240)
            });
        }

        function drawStars(t) {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            for (const s of stars) {
                const tw = (Math.sin(t * s.tw + s.ph) * 0.5 + 0.5);
                const a = s.base + tw * 0.55;
                const glow = 8 + tw * 16;
                ctx.beginPath();
                ctx.fillStyle = `rgba(210, 240, 255, ${a})`;
                ctx.shadowColor = `rgba(130, 220, 255, ${a * 0.75})`;
                ctx.shadowBlur = glow;
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function drawSnow() {
            ctx.save();
            ctx.globalCompositeOperation = 'source-over';
            ctx.shadowBlur = 0;
            for (const p of snow) {
                ctx.beginPath();
                ctx.fillStyle = `rgba(255, 255, 255, ${p.a})`;
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function updateSnow() {
            for (const p of snow) {
                p.x += p.vx;
                p.y += p.vy;
                p.vx += rand(-0.015, 0.015);
                p.vx = Math.max(-0.65, Math.min(0.65, p.vx));
                if (p.y > h + 10) {
                    p.y = -10;
                    p.x = rand(0, w);
                }
                if (p.x < -10) p.x = w + 10;
                if (p.x > w + 10) p.x = -10;
            }
        }

        function updateShooters() {
            for (let i = shooters.length - 1; i >= 0; i -= 1) {
                const s = shooters[i];
                s.x += s.vx;
                s.y += s.vy;
                s.life -= 1;
                if (s.life <= 0) shooters.splice(i, 1);
            }
        }

        function drawShooters() {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            for (const s of shooters) {
                const tailX = s.x - s.vx * (s.len / 22);
                const tailY = s.y - s.vy * (s.len / 22);
                const grd = ctx.createLinearGradient(s.x, s.y, tailX, tailY);
                grd.addColorStop(0, 'rgba(255, 255, 255, 0.95)');
                grd.addColorStop(0.25, 'rgba(210, 240, 255, 0.55)');
                grd.addColorStop(1, 'rgba(210, 240, 255, 0)');
                ctx.strokeStyle = grd;
                ctx.lineWidth = 2;
                ctx.shadowColor = 'rgba(140, 220, 255, 0.45)';
                ctx.shadowBlur = 18;
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(tailX, tailY);
                ctx.stroke();
            }
            ctx.restore();
        }

        let last = performance.now();
        function frame(now) {
            const t = now * 0.001;
            ctx.clearRect(0, 0, w, h);
            drawStars(t);
            updateShooters();
            drawShooters();
            updateSnow();
            drawSnow();

            if (Math.random() < 0.012) spawnShooter();
            last = now;
            requestAnimationFrame(frame);
        }

        function makeBulbs() {
            const lights = document.getElementById('lights');
            lights.innerHTML = '';

            const colors = [
                { c1: '#ff6b6b', c2: '#c1121f', glow: 'rgba(255, 107, 107, 0.45)' },
                { c1: '#ffd166', c2: '#c77d00', glow: 'rgba(255, 209, 102, 0.45)' },
                { c1: '#4cc9f0', c2: '#3a86ff', glow: 'rgba(76, 201, 240, 0.45)' },
                { c1: '#b5179e', c2: '#7209b7', glow: 'rgba(181, 23, 158, 0.45)' },
                { c1: '#80ffdb', c2: '#2aa36b', glow: 'rgba(128, 255, 219, 0.35)' }
            ];

            const points = [];
            const rings = [
                { y: 0.29, amp: 0.12, count: 12 },
                { y: 0.46, amp: 0.16, count: 14 },
                { y: 0.62, amp: 0.20, count: 16 }
            ];

            for (const r of rings) {
                for (let i = 0; i < r.count; i += 1) {
                    const p = i / (r.count - 1);
                    const x = 0.50 + (p - 0.5) * (0.68 + r.y * 0.55);
                    const wave = Math.sin(p * Math.PI) * r.amp;
                    points.push({
                        x,
                        y: r.y + wave * (0.8 + Math.random() * 0.35)
                    });
                }
            }

            let idx = 0;
            for (const p of points) {
                const col = colors[idx % colors.length];
                idx += 1;
                const s = document.createElement('div');
                s.className = 'bulb';
                s.style.left = (p.x * 100).toFixed(2) + '%';
                s.style.top = (p.y * 100).toFixed(2) + '%';
                s.style.setProperty('--c1', col.c1);
                s.style.setProperty('--c2', col.c2);
                s.style.setProperty('--glowc', col.glow);
                s.style.animationDelay = (Math.random() * 1.8).toFixed(2) + 's';
                s.style.animationDuration = (1.4 + Math.random() * 1.8).toFixed(2) + 's';
                s.style.width = (8 + Math.random() * 5).toFixed(0) + 'px';
                s.style.height = s.style.width;
                lights.appendChild(s);
            }
        }

        function makeOrnaments() {
            const root = document.getElementById('ornaments');
            root.innerHTML = '';
            const palette = [
                { o1: '#ff6b6b', o2: '#c1121f' },
                { o1: '#ffd166', o2: '#c77d00' },
                { o1: '#4cc9f0', o2: '#3a86ff' },
                { o1: '#f72585', o2: '#7209b7' },
                { o1: '#80ffdb', o2: '#2aa36b' }
            ];

            const spots = [
                [0.52, 0.24], [0.44, 0.30], [0.60, 0.32],
                [0.40, 0.44], [0.63, 0.44], [0.52, 0.48],
                [0.35, 0.58], [0.66, 0.58], [0.48, 0.62], [0.57, 0.66],
                [0.30, 0.70], [0.70, 0.72], [0.46, 0.74], [0.56, 0.78]
            ];

            let idx = 0;
            for (const [x, y] of spots) {
                const col = palette[idx % palette.length];
                idx += 1;
                const o = document.createElement('div');
                o.className = 'ornament';
                o.style.left = (x * 100).toFixed(2) + '%';
                o.style.top = (y * 100).toFixed(2) + '%';
                o.style.setProperty('--o1', col.o1);
                o.style.setProperty('--o2', col.o2);
                o.style.animationDelay = (Math.random() * 1.6).toFixed(2) + 's';
                const size = 14 + Math.random() * 12;
                o.style.width = size.toFixed(0) + 'px';
                o.style.height = size.toFixed(0) + 'px';
                root.appendChild(o);
            }
        }

        const tree = document.getElementById('tree');
        const treeWrap = document.getElementById('treeWrap');
        let targetRot = 0;
        let currentRot = 0;

        function onMove(e) {
            const rect = treeWrap.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            targetRot = (x - 0.5) * 2.2;
        }

        function follow() {
            currentRot += (targetRot - currentRot) * 0.06;
            tree.style.transform = `rotate(${currentRot}deg)`;
            requestAnimationFrame(follow);
        }

        resize();
        makeStars();
        makeSnow();
        makeBulbs();
        makeOrnaments();
        requestAnimationFrame(frame);
        requestAnimationFrame(follow);

        window.addEventListener('resize', () => {
            resize();
            makeStars();
            makeSnow();
        }, { passive: true });

        window.addEventListener('pointermove', onMove, { passive: true });
    </script>
</body>
</html>
